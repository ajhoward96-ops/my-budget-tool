<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monthly Budget Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f2ee;
    --surface: #ffffff;
    --surface2: #faf8f5;
    --border: #e2ddd7;
    --border2: #cec8bf;
    --text: #1a1714;
    --muted: #7a7570;
    --accent: #2d5a3d;
    --accent-light: #e8f0ea;
    --danger: #c0392b;
    --danger-light: #fdf0ee;
    --success: #2d5a3d;
    --success-light: #e8f0ea;
    --radius: 10px;
    --radius-sm: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 13px;
  }

  /* Header */
  .app-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .app-title {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: var(--text);
  }

  .month-nav {
    display: flex;
    align-items: center;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .month-nav button {
    background: none;
    border: none;
    cursor: pointer;
    padding: 8px 14px;
    font-size: 16px;
    color: var(--muted);
  }

  .month-label {
    font-family: 'DM Serif Display', serif;
    font-size: 16px;
    padding: 8px 20px;
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
    min-width: 160px;
    text-align: center;
  }

  .header-actions { display: flex; gap: 8px; }

  .btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 8px 14px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    border: 1px solid var(--border2);
    background: var(--surface);
  }

  .btn-accent { background: var(--accent); color: #fff; border-color: var(--accent); }

  .add-btn {
    background: var(--accent-light);
    color: var(--accent);
    border: none;
    font-weight: 700;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.2s;
  }
  .add-btn:hover { background: var(--accent); color: #fff; }

  /* Layout */
  .main-layout {
    display: grid;
    grid-template-columns: 1.6fr 1fr;
    gap: 1.5rem;
    padding: 1.5rem 2rem;
    max-width: 1400px;
    margin: 0 auto;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 1.25rem;
  }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 18px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }

  .card-title { font-family: 'DM Serif Display', serif; font-size: 16px; }

  /* Tables */
  .table-wrap { padding: 12px 18px; }
  .col-heads, .data-row {
    display: grid;
    gap: 8px;
    align-items: center;
    margin-bottom: 6px;
  }

  .sub-grid { grid-template-columns: 24px 1fr 100px 90px 24px; }
  .bill-grid { grid-template-columns: 24px 120px 100px 90px; }
  .save-grid { grid-template-columns: 1fr 110px 110px 24px; }
  .cc-grid { grid-template-columns: 24px 1fr 70px 100px 90px 90px 24px; }

  .col-head {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  input:not([type="checkbox"]) {
    width: 100%;
    height: 32px;
    padding: 0 8px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    outline: none;
  }
  input:focus { border-color: var(--accent); }
  input.fixed-name { background: var(--surface2); border: none; font-weight: 500; }

  .data-row.paid input:not([type="checkbox"]) { text-decoration: line-through; opacity: 0.5; }

  .remove-row { color: var(--danger); cursor: pointer; border: none; background: none; font-size: 16px; }

  /* Summary */
  .metric-block {
    padding: 12px;
    border-radius: var(--radius-sm);
    background: var(--surface2);
    border: 1px solid var(--border);
    margin-bottom: 8px;
  }
  .metric-label { font-size: 10px; font-weight: 700; text-transform: uppercase; color: var(--muted); }
  .metric-value { font-family: 'DM Serif Display', serif; font-size: 24px; }

  .progress-bar { background: var(--border); height: 6px; border-radius: 3px; margin: 10px 0; overflow: hidden; }
  #progressFill { background: var(--accent); height: 100%; width: 0%; transition: 0.3s; }

  .history-item {
    display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); cursor: pointer;
  }

  .toast {
    position: fixed; bottom: 20px; right: 20px; background: var(--text); color: #fff;
    padding: 8px 16px; border-radius: var(--radius); opacity: 0; transition: 0.3s;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<header class="app-header">
  <div class="app-title">Budget Dashboard</div>
  <div class="month-nav">
    <button onclick="changeMonth(-1)">&#8592;</button>
    <div class="month-label" id="monthLabel">April 2026</div>
    <button onclick="changeMonth(1)">&#8594;</button>
  </div>
  <div class="header-actions">
    <button class="btn" onclick="clearMonth()">Clear</button>
    <button class="btn" onclick="exportToCSV()">Export</button>
    <button class="btn btn-accent" onclick="saveData()">Save All</button>
  </div>
</header>

<div class="main-layout">
  <div class="left-col">
    
    <div class="card">
      <div class="card-header">
        <span class="card-title">Subscriptions</span>
        <button class="add-btn" onclick="addRow('subRows')">+</button>
      </div>
      <div class="table-wrap">
        <div class="col-heads sub-grid">
          <span></span><span class="col-head">Provider</span><span class="col-head">Date</span><span class="col-head">Amount</span>
        </div>
        <div id="subRows"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-header"><span class="card-title">Fixed Bills</span></div>
      <div class="table-wrap">
        <div class="col-heads bill-grid">
          <span></span><span class="col-head">Bill</span><span class="col-head">Date</span><span class="col-head">Amount</span>
        </div>
        <div id="billRows"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <span class="card-title">Savings & Goals</span>
        <button class="add-btn" onclick="addRow('saveRows')">+</button>
      </div>
      <div class="table-wrap">
        <div class="col-heads save-grid">
          <span class="col-head">Goal/Account</span><span class="col-head">Starting Bal</span><span class="col-head">Deposit</span>
        </div>
        <div id="saveRows"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <span class="card-title">Credit Cards</span>
        <button class="add-btn" onclick="addRow('ccRows')">+</button>
      </div>
      <div class="table-wrap">
        <div class="col-heads cc-grid">
          <span></span><span class="col-head">Card</span><span class="col-head">Int %</span><span class="col-head">Balance</span><span class="col-head">Payment</span><span class="col-head">Date</span>
        </div>
        <div id="ccRows"></div>
      </div>
    </div>

  </div>

  <div class="right-col">
    <div class="card">
      <div class="card-header"><span class="card-title">Summary</span></div>
      <div class="table-wrap">
        <div class="metric-label">Monthly Income</div>
        <div style="display:flex; align-items:center; gap:5px; margin-bottom:15px;">
          <span>$</span><input type="number" id="incomeInput" placeholder="0.00" oninput="recalc()" style="font-size:18px; height:40px;">
        </div>

        <div class="metric-block">
          <div class="metric-label">Total Expenses</div>
          <div class="metric-value" id="totalExp">$0.00</div>
        </div>

        <div class="metric-block">
          <div class="metric-label">Savings Contribution</div>
          <div class="metric-value" id="totalSave">$0.00</div>
        </div>

        <div class="progress-bar"><div id="progressFill"></div></div>

        <div class="metric-block" id="balBlock">
          <div class="metric-label">Remaining</div>
          <div class="metric-value" id="balanceText">$0.00</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header"><span class="card-title">History</span></div>
      <div class="table-wrap" id="historyList"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast">Saved Successfully</div>

<script>
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const FIXED_BILLS = ["Rent", "Electricity", "Water", "Gas", "WiFi", "Phone", "Car Insurance"];
let currentYear, currentMonth;

function init() {
  const d = new Date();
  currentYear = d.getFullYear();
  currentMonth = d.getMonth();
  loadMonth();
}

function addRow(containerId, data = null) {
  const container = document.getElementById(containerId);
  const row = document.createElement('div');
  row.className = 'data-row ' + (containerId.replace('Rows', '-grid'));
  
  if (containerId === 'subRows') {
    row.innerHTML = `
      <input type="checkbox" class="paid-check" onchange="recalc()" ${data?.paid ? 'checked' : ''}>
      <input type="text" class="name-in" placeholder="Netflix..." value="${data?.name || ''}">
      <input type="date" class="date-in" value="${data?.date || ''}">
      <input type="number" class="amt-in" placeholder="0.00" oninput="recalc()" value="${data?.amt || ''}">
      <button class="remove-row" onclick="this.parentElement.remove(); recalc()">×</button>
    `;
  } else if (containerId === 'saveRows') {
    row.innerHTML = `
      <input type="text" class="name-in" placeholder="Emergency Fund" value="${data?.name || ''}">
      <input type="number" class="start-in" placeholder="0.00" value="${data?.start || ''}">
      <input type="number" class="amt-in" placeholder="0.00" oninput="recalc()" value="${data?.amt || ''}">
      <button class="remove-row" onclick="this.parentElement.remove(); recalc()">×</button>
    `;
  } else if (containerId === 'ccRows') {
    row.innerHTML = `
      <input type="checkbox" class="paid-check" onchange="recalc()" ${data?.paid ? 'checked' : ''}>
      <input type="text" class="name-in" placeholder="Visa" value="${data?.name || ''}">
      <input type="number" class="int-in" placeholder="%" value="${data?.interest || ''}">
      <input type="number" class="bal-in" placeholder="Balance" value="${data?.balance || ''}">
      <input type="number" class="amt-in" placeholder="0.00" oninput="recalc()" value="${data?.amt || ''}">
      <input type="date" class="date-in" value="${data?.date || ''}">
      <button class="remove-row" onclick="this.parentElement.remove(); recalc()">×</button>
    `;
  }
  container.appendChild(row);
}

function buildFixedBills(data = []) {
  const container = document.getElementById('billRows');
  container.innerHTML = '';
  FIXED_BILLS.forEach((name, i) => {
    const row = document.createElement('div');
    row.className = 'data-row bill-grid';
    const saved = data[i] || {};
    row.innerHTML = `
      <input type="checkbox" class="paid-check" onchange="recalc()" ${saved.paid ? 'checked' : ''}>
      <input type="text" class="fixed-name" value="${name}" readonly>
      <input type="date" class="date-in" value="${saved.date || ''}">
      <input type="number" class="amt-in" placeholder="0.00" oninput="recalc()" value="${saved.amt || ''}">
    `;
    container.appendChild(row);
  });
}

function recalc() {
  let exp = 0; let save = 0;
  document.querySelectorAll('.amt-in').forEach(i => {
    const val = parseFloat(i.value) || 0;
    if (i.closest('#saveRows')) save += val;
    else exp += val;
  });

  const income = parseFloat(document.getElementById('incomeInput').value) || 0;
  const net = income - exp - save;

  document.getElementById('totalExp').textContent = '$' + exp.toFixed(2);
  document.getElementById('totalSave').textContent = '$' + save.toFixed(2);
  document.getElementById('balanceText').textContent = '$' + net.toFixed(2);

  const fill = document.getElementById('progressFill');
  const pct = income > 0 ? (exp / income) * 100 : 0;
  fill.style.width = Math.min(pct, 100) + '%';
  fill.style.background = pct > 90 ? 'var(--danger)' : 'var(--accent)';

  document.querySelectorAll('.data-row').forEach(row => {
    const cb = row.querySelector('.paid-check');
    if (cb) row.classList.toggle('paid', cb.checked);
  });

  const block = document.getElementById('balBlock');
  block.style.borderColor = net < 0 ? 'var(--danger)' : 'var(--border)';
}

function getStoreKey() { return `budget_${currentYear}_${currentMonth}`; }

function saveData() {
  const data = {
    income: document.getElementById('incomeInput').value,
    subs: Array.from(document.querySelectorAll('#subRows .data-row')).map(r => ({
      paid: r.querySelector('.paid-check').checked,
      name: r.querySelector('.name-in').value,
      date: r.querySelector('.date-in').value,
      amt: r.querySelector('.amt-in').value
    })),
    bills: Array.from(document.querySelectorAll('#billRows .data-row')).map(r => ({
      paid: r.querySelector('.paid-check').checked,
      date: r.querySelector('.date-in').value,
      amt: r.querySelector('.amt-in').value
    })),
    savings: Array.from(document.querySelectorAll('#saveRows .data-row')).map(r => ({
      name: r.querySelector('.name-in').value,
      start: r.querySelector('.start-in').value,
      amt: r.querySelector('.amt-in').value
    })),
    cards: Array.from(document.querySelectorAll('#ccRows .data-row')).map(r => ({
      paid: r.querySelector('.paid-check').checked,
      name: r.querySelector('.name-in').value,
      interest: r.querySelector('.int-in').value,
      balance: r.querySelector('.bal-in').value,
      amt: r.querySelector('.amt-in').value,
      date: r.querySelector('.date-in').value
    }))
  };
  localStorage.setItem(getStoreKey(), JSON.stringify(data));
  renderHistory();
  showToast();
}

function loadMonth() {
  document.getElementById('monthLabel').textContent = `${MONTHS[currentMonth]} ${currentYear}`;
  const saved = JSON.parse(localStorage.getItem(getStoreKey()) || '{}');
  
  document.getElementById('incomeInput').value = saved.income || '';
  document.getElementById('subRows').innerHTML = '';
  document.getElementById('saveRows').innerHTML = '';
  document.getElementById('ccRows').innerHTML = '';
  
  buildFixedBills(saved.bills || []);
  (saved.subs || []).forEach(s => addRow('subRows', s));
  (saved.savings || []).forEach(s => addRow('saveRows', s));
  (saved.cards || []).forEach(s => addRow('ccRows', s));
  
  if (!saved.subs) addRow('subRows');
  if (!saved.savings) addRow('saveRows');
  if (!saved.cards) addRow('ccRows');

  recalc();
}

function changeMonth(dir) {
  currentMonth += dir;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  else if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  loadMonth();
}

function renderHistory() {
  const hist = document.getElementById('historyList');
  hist.innerHTML = '';
  Object.keys(localStorage).filter(k => k.startsWith('budget_')).sort().reverse().forEach(k => {
    const d = JSON.parse(localStorage.getItem(k));
    const parts = k.split('_');
    const item = document.createElement('div');
    item.className = 'history-item';
    item.innerHTML = `<span>${MONTHS[parts[2]]} ${parts[1]}</span><strong>Inc: $${parseFloat(d.income||0).toFixed(0)}</strong>`;
    item.onclick = () => { currentYear = parseInt(parts[1]); currentMonth = parseInt(parts[2]); loadMonth(); };
    hist.appendChild(item);
  });
}

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function clearMonth() {
  if (confirm("Reset current month?")) {
    localStorage.removeItem(getStoreKey());
    loadMonth();
  }
}

function exportToCSV() {
  const saved = JSON.parse(localStorage.getItem(getStoreKey
