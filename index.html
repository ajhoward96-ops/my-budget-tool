<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f2ee; --surface: #ffffff; --surface2: #faf8f5; --border: #e2ddd7;
    --text: #1a1714; --muted: #7a7570; --accent: #2d5a3d; --accent-light: #e8f0ea;
    --danger: #c0392b; --radius: 10px; --radius-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 50px; }
  
  .app-header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 0 2rem; display: flex; align-items: center; justify-content: space-between;
    height: 64px; position: sticky; top: 0; z-index: 100;
  }
  .app-title { font-family: 'DM Serif Display', serif; font-size: 22px; }
  
  .month-nav { display: flex; align-items: center; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); }
  .month-nav button { background: none; border: none; cursor: pointer; padding: 8px 14px; font-size: 16px; }
  .month-label { font-family: 'DM Serif Display', serif; padding: 8px 20px; min-width: 160px; text-align: center; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }

  .main-layout { display: grid; grid-template-columns: 1.6fr 1fr; gap: 1.5rem; padding: 1.5rem 2rem; max-width: 1400px; margin: 0 auto; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 1.25rem; }
  .card-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 18px; background: var(--surface2); border-bottom: 1px solid var(--border); }
  .card-title { font-family: 'DM Serif Display', serif; font-size: 16px; }

  .add-btn { background: var(--accent); color: #fff; border: none; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; font-weight: bold; font-size: 18px; }

  .table-wrap { padding: 12px 18px; }
  .col-heads, .data-row { display: grid; gap: 8px; align-items: center; margin-bottom: 8px; }
  .sub-grid { grid-template-columns: 30px 1fr 120px 100px 30px; }
  .bill-grid { grid-template-columns: 30px 1fr 120px 100px; }
  .save-grid { grid-template-columns: 1fr 110px 110px 30px; }
  .cc-grid { grid-template-columns: 30px 1fr 70px 100px 100px 110px 30px; }

  .col-head { font-size: 10px; font-weight: 700; text-transform: uppercase; color: var(--muted); }
  input:not([type="checkbox"]) { width: 100%; height: 34px; padding: 0 8px; border: 1px solid var(--border); border-radius: var(--radius-sm); }
  .paid input { text-decoration: line-through; opacity: 0.5; }
  .remove-row { color: var(--danger); cursor: pointer; background: none; border: none; font-size: 20px; font-weight: bold; }

  .metric-block { padding: 15px; border-radius: var(--radius); background: var(--surface2); border: 1px solid var(--border); margin-bottom: 10px; }
  .metric-value { font-family: 'DM Serif Display', serif; font-size: 28px; }
  .btn-accent { background: var(--accent); color: white; padding: 10px 20px; border-radius: var(--radius-sm); border: none; cursor: pointer; font-weight: bold; }
</style>
</head>
<body>

<header class="app-header">
  <div class="app-title">Budget Dashboard</div>
  <div class="month-nav">
    <button onclick="changeMonth(-1)">&#8592;</button>
    <div class="month-label" id="monthLabel">Loading...</div>
    <button onclick="changeMonth(1)">&#8594;</button>
  </div>
  <div class="header-actions">
    <button class="btn-accent" onclick="saveData()">Save Changes</button>
  </div>
</header>

<div class="main-layout">
  <div class="left-col">
    <div class="card">
      <div class="card-header"><span class="card-title">Subscriptions</span><button class="add-btn" onclick="addRow('subRows')">+</button></div>
      <div class="table-wrap">
        <div class="col-heads sub-grid"><span></span><span class="col-head">Provider</span><span class="col-head">Due Date</span><span class="col-head">Amount</span></div>
        <div id="subRows"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-header"><span class="card-title">Fixed Bills</span></div>
      <div class="table-wrap">
        <div class="col-heads bill-grid"><span></span><span class="col-head">Bill Name</span><span class="col-head">Due Date</span><span class="col-head">Amount</span></div>
        <div id="billRows"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-header"><span class="card-title">Savings</span><button class="add-btn" onclick="addRow('saveRows')">+</button></div>
      <div class="table-wrap">
        <div class="col-heads save-grid"><span class="col-head">Account/Goal</span><span class="col-head">Start Bal</span><span class="col-head">Monthly Deposit</span></div>
        <div id="saveRows"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-header"><span class="card-title">Credit Cards</span><button class="add-btn" onclick="addRow('ccRows')">+</button></div>
      <div class="table-wrap">
        <div class="col-heads cc-grid"><span></span><span class="col-head">Card</span><span class="col-head">Int %</span><span class="col-head">Total Bal</span><span class="col-head">Payment</span><span class="col-head">Date</span></div>
        <div id="ccRows"></div>
      </div>
    </div>
  </div>

  <div class="right-col">
    <div class="card">
      <div class="card-header"><span class="card-title">Monthly Summary</span></div>
      <div class="table-wrap">
        <div class="metric-block">
          <div class="col-head">Monthly Income</div>
          <input type="number" id="incomeInput" oninput="recalc()" style="font-size: 20px; height: 45px; margin-top: 5px;">
        </div>
        <div class="metric-block">
          <div class="col-head">Total Expenses</div>
          <div class="metric-value" id="totalExp">$0.00</div>
        </div>
        <div class="metric-block">
          <div class="col-head">Remaining</div>
          <div class="metric-value" id="balanceText">$0.00</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const FIXED_BILLS = ["Rent", "Electricity", "Water", "Gas", "WiFi", "Phone", "Car Insurance"];
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
let curY, curM;

function init() {
  const d = new Date(); curY = d.getFullYear(); curM = d.getMonth();
  loadMonth();
}

function addRow(id, data = null) {
  const container = document.getElementById(id);
  const row = document.createElement('div');
  row.className = 'data-row ' + id.replace('Rows', '-grid');
  
  if (id === 'subRows') {
    row.innerHTML = `<input type="checkbox" onchange="recalc()" ${data?.paid?'checked':''}>
      <input type="text" class="n-in" placeholder="Netflix" value="${data?.n||''}">
      <input type="date" class="d-in" value="${data?.d||''}">
      <input type="number" class="a-in" oninput="recalc()" value="${data?.a||''}">
      <button class="remove-row" onclick="this.parentElement.remove();recalc()">×</button>`;
  } else if (id === 'saveRows') {
    row.innerHTML = `<input type="text" class="n-in" placeholder="Savings" value="${data?.n||''}">
      <input type="number" value="${data?.s||''}">
      <input type="number" class="a-in" oninput="recalc()" value="${data?.a||''}">
      <button class="remove-row" onclick="this.parentElement.remove();recalc()">×</button>`;
  } else if (id === 'ccRows') {
    row.innerHTML = `<input type="checkbox" onchange="recalc()" ${data?.paid?'checked':''}>
      <input type="text" class="n-in" placeholder="Visa" value="${data?.n||''}">
      <input type="number" value="${data?.i||''}">
      <input type="number" value="${data?.b||''}">
      <input type="number" class="a-in" oninput="recalc()" value="${data?.a||''}">
      <input type="date" value="${data?.d||''}">
      <button class="remove-row" onclick="this.parentElement.remove();recalc()">×</button>`;
  }
  container.appendChild(row);
  recalc();
}

function loadMonth() {
  document.getElementById('monthLabel').textContent = `${MONTHS[curM]} ${curY}`;
  const saved = JSON.parse(localStorage.getItem(`budget_${curY}_${curM}`) || '{}');
  document.getElementById('incomeInput').value = saved.inc || '';
  
  const bRows = document.getElementById('billRows'); bRows.innerHTML = '';
  FIXED_BILLS.forEach((name, i) => {
    const s = (saved.bills || [])[i] || {};
    const r = document.createElement('div'); r.className = 'data-row bill-grid';
    r.innerHTML = `<input type="checkbox" onchange="recalc()" ${s.p?'checked':''}>
      <input type="text" value="${name}" readonly style="border:none;background:none;font-weight:bold;">
      <input type="date" value="${s.d||''}">
      <input type="number" class="a-in" oninput="recalc()" value="${s.a||''}">`;
    bRows.appendChild(r);
  });

  ['subRows', 'saveRows', 'ccRows'].forEach(id => {
    document.getElementById(id).innerHTML = '';
    const list = id === 'subRows' ? saved.subs : (id === 'saveRows' ? saved.saves : saved.ccs);
    if (list && list.length) list.forEach(item => addRow(id, item));
    else addRow(id);
  });
  recalc();
}

function recalc() {
  let total = 0;
  document.querySelectorAll('.a-in').forEach(i => total += parseFloat(i.value) || 0);
  const inc = parseFloat(document.getElementById('incomeInput').value) || 0;
  document.getElementById('totalExp').textContent = '$' + total.toFixed(2);
  document.getElementById('balanceText').textContent = '$' + (inc - total).toFixed(2);
  document.querySelectorAll('.data-row').forEach(r => {
    const c = r.querySelector('input[type="checkbox"]');
    if (c) r.classList.toggle('paid', c.checked);
  });
}

function saveData() {
  const data = {
    inc: document.getElementById('incomeInput').value,
    subs: Array.from(document.querySelectorAll('#subRows .data-row')).map(r => ({p:r.children[0].checked, n:r.children[1].value, d:r.children[2].value, a:r.children[3].value})),
    saves: Array.from(document.querySelectorAll('#saveRows .data-row')).map(r => ({n:r.children[0].value, s:r.children[1].value, a:r.children[2].value})),
    ccs: Array.from(document.querySelectorAll('#ccRows .data-row')).map(r => ({p:r.children[0].checked, n:r.children[1].value, i:r.children[2].value, b:r.children[3].value, a:r.children[4].value, d:r.children[5].value})),
    bills: Array.from(document.querySelectorAll('#billRows .data-row')).map(r => ({p:r.children[0].checked, d:r.children[2].value, a:r.children[3].value}))
  };
  localStorage.setItem(`budget_${curY}_${curM}`, JSON.stringify(data));
  alert('Saved!');
}

function changeMonth(v) { curM += v; if (curM>11){curM=0;curY++} if (curM<0){curM=11;curY--} loadMonth(); }

init();
</script>
</body>
</html>
