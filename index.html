<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monthly Budget Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f2ee;
    --surface: #ffffff;
    --surface2: #faf8f5;
    --border: #e2ddd7;
    --border2: #cec8bf;
    --text: #1a1714;
    --muted: #7a7570;
    --accent: #2d5a3d;
    --accent-light: #e8f0ea;
    --accent2: #8b4513;
    --danger: #c0392b;
    --danger-light: #fdf0ee;
    --success: #2d5a3d;
    --success-light: #e8f0ea;
    --warning: #b8860b;
    --warning-light: #fef9e7;
    --radius: 10px;
    --radius-sm: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
  }

  /* Header */
  .app-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .app-title {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: var(--text);
    letter-spacing: -0.3px;
  }

  .month-nav {
    display: flex;
    align-items: center;
    gap: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .month-nav button {
    background: none;
    border: none;
    cursor: pointer;
    padding: 8px 14px;
    font-size: 16px;
    color: var(--muted);
    transition: background 0.15s, color 0.15s;
    font-family: 'DM Sans', sans-serif;
  }

  .month-nav button:hover { background: var(--border); color: var(--text); }

  .month-nav .month-label {
    font-family: 'DM Serif Display', serif;
    font-size: 16px;
    padding: 8px 20px;
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
    min-width: 180px;
    text-align: center;
    color: var(--text);
  }

  .header-actions { display: flex; gap: 10px; align-items: center; }

  .btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--text);
    transition: background 0.15s;
  }
  .btn:hover { background: var(--border); }
  .btn-accent {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .btn-accent:hover { background: #1e3f2a; }

  /* Layout */
  .main-layout {
    display: grid;
    grid-template-columns: minmax(0, 1.55fr) minmax(0, 1fr);
    gap: 1.5rem;
    padding: 1.5rem 2rem;
    max-width: 1300px;
    margin: 0 auto;
  }

  /* Section cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 1.25rem;
  }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }

  .card-title {
    font-family: 'DM Serif Display', serif;
    font-size: 17px;
    color: var(--text);
  }

  .card-total-badge {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    background: var(--accent-light);
    padding: 3px 10px;
    border-radius: 20px;
  }

  /* Table */
  .table-wrap { padding: 12px 18px; }

  .col-heads {
    display: grid;
    gap: 8px;
    margin-bottom: 6px;
  }
  .col-heads.sub-grid { grid-template-columns: 30px 1fr 110px 100px; }
  .col-heads.bill-grid { grid-template-columns: 30px 1fr 110px 100px; }

  .col-head {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
  }
  .col-head.right { text-align: right; }

  .data-row {
    display: grid;
    gap: 8px;
    margin-bottom: 6px;
    align-items: center;
  }
  .data-row.sub-grid { grid-template-columns: 30px 1fr 110px 100px; }
  .data-row.bill-grid { grid-template-columns: 30px 1fr 110px 100px; }

  .data-row.paid input:not([type="checkbox"]) {
    text-decoration: line-through;
    opacity: 0.5;
  }

  input[type="text"],
  input[type="number"],
  input[type="date"] {
    width: 100%;
    height: 34px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 0 9px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface);
    color: var(--text);
    transition: border-color 0.15s, background 0.15s;
    outline: none;
  }
  input:focus { border-color: var(--accent); background: #fff; }
  input[type="number"] { text-align: right; }
  input.fixed-name {
    background: var(--surface2);
    font-weight: 500;
    color: var(--text);
    cursor: default;
  }
  input.fixed-name:focus { border-color: var(--border); background: var(--surface2); }

  /* Right panel */
  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 1.25rem;
  }

  .summary-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
    font-family: 'DM Serif Display', serif;
    font-size: 17px;
  }

  .summary-body { padding: 14px 18px; }

  .metric-block {
    padding: 12px 14px;
    border-radius: var(--radius-sm);
    margin-bottom: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
  }

  .metric-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--muted);
    margin-bottom: 5px;
  }

  .metric-value {
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    color: var(--text);
  }

  .metric-block.success { background: var(--success-light); border-color: #b8d4be; }
  .metric-block.success .metric-value { color: var(--success); }
  .metric-block.danger { background: var(--danger-light); border-color: #f0c0bc; }
  .metric-block.danger .metric-value { color: var(--danger); }
  .metric-block.warning { background: var(--warning-light); border-color: #f0d870; }
  .metric-block.warning .metric-value { color: var(--warning); }

  .progress-container {
    background: var(--border);
    height: 8px;
    border-radius: 4px;
    margin-bottom: 15px;
    overflow: hidden;
  }
  #progressBar {
    background: var(--accent);
    height: 100%;
    width: 0%;
    transition: width 0.3s ease;
  }

  .divider { height: 1px; background: var(--border); margin: 14px 0; }

  .income-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 10px;
  }
  .income-prefix {
    font-size: 18px;
    font-weight: 500;
    color: var(--muted);
    line-height: 1;
  }
  .income-row input {
    flex: 1;
    height: 40px;
    font-size: 18px;
    font-family: 'DM Serif Display', serif;
    text-align: right;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
  }

  /* History Card */
  .history-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .history-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
    font-family: 'DM Serif Display', serif;
    font-size: 17px;
  }

  .history-list { padding: 10px 18px; max-height: 240px; overflow-y: auto; }

  .history-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
  }
  .history-item:last-child { border-bottom: none; }

  .hist-bal.pos { color: var(--success); font-weight: 600; }
  .hist-bal.neg { color: var(--danger); font-weight: 600; }

  .no-history { padding: 16px 0; color: var(--muted); font-size: 13px; text-align: center; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--text);
    color: #fff;
    padding: 10px 18px;
    border-radius: var(--radius);
    font-size: 13px;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.25s, transform 0.25s;
    pointer-events: none;
    z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<header class="app-header">
  <div class="app-title">Budget Tracker</div>
  <div class="month-nav">
    <button onclick="changeMonth(-1)">&#8592;</button>
    <div class="month-label" id="monthLabel">—</div>
    <button onclick="changeMonth(1)">&#8594;</button>
  </div>
  <div class="header-actions">
    <button class="btn" onclick="clearMonth()">Clear month</button>
    <button class="btn" onclick="exportToCSV()">Export to CSV</button>
    <button class="btn btn-accent" onclick="saveData()">Save</button>
  </div>
</header>

<div class="main-layout">
  <div class="left-col">

    <div class="card">
      <div class="card-header">
        <span class="card-title">Subscriptions</span>
        <span class="card-total-badge" id="subBadge">$0.00</span>
      </div>
      <div class="table-wrap">
        <div class="col-heads sub-grid">
          <span class="col-head"></span>
          <span class="col-head">Name</span>
          <span class="col-head">Due date</span>
          <span class="col-head right">Amount</span>
        </div>
        <div id="subRows"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <span class="card-title">Bills</span>
        <span class="card-total-badge" id="billBadge">$0.00</span>
      </div>
      <div class="table-wrap">
        <div class="col-heads bill-grid">
          <span class="col-head"></span>
          <span class="col-head">Bill</span>
          <span class="col-head">Due date</span>
          <span class="col-head right">Amount</span>
        </div>
        <div id="billRows"></div>
      </div>
    </div>

  </div>

  <div class="right-col">
    <div class="summary-card">
      <div class="summary-header">Monthly Summary</div>
      <div class="summary-body">
        <div class="metric-block">
          <div class="metric-label">Subscriptions total</div>
          <div class="metric-value" id="subTotal">$0.00</div>
        </div>
        <div class="metric-block">
          <div class="metric-label">Bills total</div>
          <div class="metric-value" id="billTotal">$0.00</div>
        </div>
        <div class="metric-block">
          <div class="metric-label">Total expenses</div>
          <div class="metric-value" id="expTotal">$0.00</div>
        </div>
        
        <div class="divider"></div>
        <div class="metric-label">Spending Progress</div>
        <div class="progress-container">
          <div id="progressBar"></div>
        </div>

        <div class="metric-label">Monthly income</div>
        <div class="income-row">
          <span class="income-prefix">$</span>
          <input type="number" id="incomeInput" placeholder="0.00" oninput="recalc()">
        </div>
        <div class="metric-block" id="balanceBlock">
          <div class="metric-label">Remaining balance</div>
          <div class="metric-value" id="balance">$0.00</div>
        </div>
      </div>
    </div>

    <div class="history-card">
      <div class="history-header">Past months</div>
      <div class="history-list" id="historyList">
        <div class="no-history">No saved months yet.</div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const BILL_NAMES = ["WiFi","Water","Gas","Electricity","Rent","Car insurance","Phone bill","Other"];
const SUB_COUNT = 10;
let currentYear, currentMonth;

function monthKey(y, m) { return `budget_${y}_${m}`; }

function init() {
  const now = new Date();
  currentYear = now.getFullYear();
  currentMonth = now.getMonth();
  buildRows();
  loadMonth();
  renderHistory();
}

function buildRows() {
  const subContainer = document.getElementById('subRows');
  subContainer.innerHTML = '';
  for (let i = 0; i < SUB_COUNT; i++) {
    const row = document.createElement('div');
    row.className = 'data-row sub-grid';
    row.innerHTML = `
      <input type="checkbox" class="sub-paid" onchange="togglePaid(this)">
      <input type="text" class="sub-name" placeholder="Subscription name" oninput="autoSave()">
      <input type="date" class="sub-date" onchange="autoSave()">
      <input type="number" class="sub-amt" placeholder="0.00" oninput="recalc()">
    `;
    subContainer.appendChild(row);
  }

  const billContainer = document.getElementById('billRows');
  billContainer.innerHTML = '';
  BILL_NAMES.forEach(name => {
    const row = document.createElement('div');
    row.className = 'data-row bill-grid';
    row.innerHTML = `
      <input type="checkbox" class="bill-paid" onchange="togglePaid(this)">
      <input type="text" class="fixed-name" value="${name}" readonly>
      <input type="date" class="bill-date" onchange="autoSave()">
      <input type="number" class="bill-amt" placeholder="0.00" oninput="recalc()">
    `;
    billContainer.appendChild(row);
  });
}

function togglePaid(el) {
  el.parentElement.classList.toggle('paid', el.checked);
  autoSave();
}

function getFormData() {
  const subs = [];
  document.querySelectorAll('#subRows .data-row').forEach(row => {
    subs.push({
      paid: row.querySelector('.sub-paid').checked,
      name: row.querySelector('.sub-name').value,
      date: row.querySelector('.sub-date').value,
      amt: row.querySelector('.sub-amt').value
    });
  });
  const bills = [];
  document.querySelectorAll('#billRows .data-row').forEach(row => {
    bills.push({
      paid: row.querySelector('.bill-paid').checked,
      date: row.querySelector('.bill-date').value,
      amt: row.querySelector('.bill-amt').value
    });
  });
  return { subs, bills, income: document.getElementById('incomeInput').value };
}

function setFormData(data) {
  if (!data) return;
  const subRows = document.querySelectorAll('#subRows .data-row');
  (data.subs || []).forEach((s, i) => {
    if (subRows[i]) {
      subRows[i].querySelector('.sub-paid').checked = s.paid || false;
      subRows[i].classList.toggle('paid', s.paid);
      subRows[i].querySelector('.sub-name').value = s.name || '';
      subRows[i].querySelector('.sub-date').value = s.date || '';
      subRows[i].querySelector('.sub-amt').value = s.amt || '';
    }
  });
  const billRows = document.querySelectorAll('#billRows .data-row');
  (data.bills || []).forEach((b, i) => {
    if (billRows[i]) {
      billRows[i].querySelector('.bill-paid').checked = b.paid || false;
      billRows[i].classList.toggle('paid', b.paid);
      billRows[i].querySelector('.bill-date').value = b.date || '';
      billRows[i].querySelector('.bill-amt').value = b.amt || '';
    }
  });
  document.getElementById('incomeInput').value = data.income || '';
  recalc();
}

function recalc() {
  let sTotal = 0, bTotal = 0;
  document.querySelectorAll('.sub-amt').forEach(i => sTotal += parseFloat(i.value) || 0);
  document.querySelectorAll('.bill-amt').forEach(i => bTotal += parseFloat(i.value) || 0);
  const exp = sTotal + bTotal;
  const income = parseFloat(document.getElementById('incomeInput').value) || 0;
  const bal = income - exp;

  const fmt = n => '$' + n.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
  document.getElementById('subTotal').textContent = fmt(sTotal);
  document.getElementById('subBadge').textContent = fmt(sTotal);
  document.getElementById('billTotal').textContent = fmt(bTotal);
  document.getElementById('billBadge').textContent = fmt(bTotal);
  document.getElementById('expTotal').textContent = fmt(exp);
  document.getElementById('balance').textContent = fmt(bal);

  const percent = income > 0 ? Math.min((exp / income) * 100, 100) : 0;
  const bar = document.getElementById('progressBar');
  bar.style.width = percent + '%';
  bar.style.background = percent >= 100 ? 'var(--danger)' : 'var(--accent)';

  const block = document.getElementById('balanceBlock');
  block.className = 'metric-block ' + (income > 0 ? (bal >= 0 ? 'success' : 'danger') : '');

  autoSave();
}

function loadMonth() {
  document.getElementById('monthLabel').textContent = `${MONTHS[currentMonth]} ${currentYear}`;
  buildRows();
  const saved = localStorage.getItem(monthKey(currentYear, currentMonth));
  if (saved) setFormData(JSON.parse(saved));
  else recalc();
}

function saveData() {
  localStorage.setItem(monthKey(currentYear, currentMonth), JSON.stringify(getFormData()));
  renderHistory();
  showToast('Saved!');
}

function autoSave() {
  localStorage.setItem(monthKey(currentYear, currentMonth), JSON.stringify(getFormData()));
  renderHistory();
}

function clearMonth() {
  if (!confirm('Clear data for this month?')) return;
  localStorage.removeItem(monthKey(currentYear, currentMonth));
  loadMonth();
}

function changeMonth(dir) {
  currentMonth += dir;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  loadMonth();
}

function renderHistory() {
  const list = document.getElementById('historyList');
  const keys = Object.keys(localStorage).filter(k => k.startsWith('budget_')).sort().reverse();
  if (!keys.length) { list.innerHTML = '<div class="no-history">No saved months yet.</div>'; return; }
  list.innerHTML = '';
  keys.forEach(k => {
    const parts = k.split('_');
    const data = JSON.parse(localStorage.getItem(k));
    let exp = 0;
    data.subs.forEach(s => exp += parseFloat(s.amt) || 0);
    data.bills.forEach(b => exp += parseFloat(b.amt) || 0);
    const bal = (parseFloat(data.income) || 0) - exp;
    const item = document.createElement('div');
    item.className = 'history-item';
    item.innerHTML = `<span>${MONTHS[parts[2]]} ${parts[1]}</span><span class="hist-bal ${bal>=0?'pos':'neg'}">$${bal.toFixed(0)}</span>`;
    item.onclick = () => { currentYear = parseInt(parts[1]); currentMonth = parseInt(parts[2]); loadMonth(); };
    list.appendChild(item);
  });
}

function exportToCSV() {
  const data = getFormData();
  let csv = "Category,Name,Date,Amount,Paid\n";
  data.subs.forEach(s => csv += `Subscription,${s.name},${s.date},${s.amt},${s.paid}\n`);
  data.bills.forEach((b, i) => csv += `Bill,${BILL_NAMES[i]},${b.date},${b.amt},${b.paid}\n`);
  csv += `Summary,Monthly Income,,${data.income},\n`;
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `budget_${MONTHS[currentMonth]}_${currentYear}.csv`;
  a.click();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

init();
</script>
</body>
</html>
